onboarding = false

[theme]
# Built-in themes: catppuccin, terminal, tokyo-night, dracula, nord, gruvbox, one-dark, solarized, kanagawa, rose-pine, vesper
name = "tokyo-night"

[keys]
split_vertical = "prefix+backslash"
split_horizontal = "prefix+minus"

[[keys.command]]
key = "ctrl+shift+f"
type = "pane"
command = "herdr-sessionizer"

[ui]
prompt_new_tab_name = false
show_agent_labels_on_pane_borders = true
agent_panel_sort = "spaces"

[ui.sidebar.spaces]
row_gap = 1 

[ui.sidebar.agents]
row_gap = 1 
rows = [
  ["state_icon", "workspace", "state_text"],
  ["terminal_title_stripped"],
]

# Play sounds when agents change state in background workspaces
[ui.sound]
enabled = true

[session]
resume_agents_on_restore = true

[experimental]
pane_history = true
