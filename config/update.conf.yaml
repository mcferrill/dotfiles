
- shell:
      - [git pull, get latest version]
      - [git submodule foreach 'git pull origin main || :', try pulling main]
      - [
            git submodule foreach 'git pull origin master || :',
            try pulling master,
        ]

- omnipkg:
    - update
    - upgrade

- crossplatform-shell:
      # - command: mise self-update -y
